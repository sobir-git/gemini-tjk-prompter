services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      cache_from:
        - gemini-tjk-prompter-server:latest
    env_file:
      - .env
    environment:
      - PORT=9000
    ports:
      - "9000:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
